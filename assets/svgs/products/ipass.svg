<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280">
  <defs>
    <filter id="ip-sh1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.20"/>
    </filter>
    <filter id="ip-sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="7"  flood-color="#000" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="ip-g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF8C00"/>
      <stop offset="50%"  stop-color="#E5300D"/>
      <stop offset="100%" stop-color="#C2001A"/>
    </linearGradient>
    <linearGradient id="ip-g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FFBE00"/>
    </linearGradient>
    <clipPath id="ip-c1"><rect width="290" height="183" rx="13" ry="13"/></clipPath>
    <clipPath id="ip-c2"><rect width="290" height="183" rx="13" ry="13"/></clipPath>
  </defs>

  <!-- 後卡 -->
  <g transform="translate(125,25) rotate(7)" filter="url(#ip-sh2)">
    <rect width="290" height="183" rx="13" fill="white"/>
    <g clip-path="url(#ip-c2)">
      <rect width="290" height="183" fill="url(#ip-g2)"/>
      <circle cx="270" cy="25"  r="100" fill="white" opacity="0.08"/>
      <circle cx="20"  cy="165" r="80"  fill="white" opacity="0.07"/>
      <rect x="18" y="68" width="42" height="32" rx="5" fill="#D4AF37" opacity="0.85"/>
      <line x1="18" y1="78" x2="60" y2="78" stroke="#A8880A" stroke-width="1"/>
      <line x1="18" y1="90" x2="60" y2="90" stroke="#A8880A" stroke-width="1"/>
      <line x1="32" y1="68" x2="32" y2="100" stroke="#A8880A" stroke-width="1"/>
      <line x1="46" y1="68" x2="46" y2="100" stroke="#A8880A" stroke-width="1"/>
      <rect x="0" y="148" width="290" height="35" fill="black" opacity="0.20"/>
      <text x="145" y="170" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">一卡通 iPASS</text>
    </g>
  </g>

  <!-- 前卡（客製設計面） -->
  <g transform="translate(10,18)" filter="url(#ip-sh1)">
    <rect width="290" height="183" rx="13" fill="white"/>
    <g clip-path="url(#ip-c1)">
      <rect width="290" height="183" fill="url(#ip-g1)"/>
      <!-- 裝飾 -->
      <circle cx="255" cy="30"  r="90"  fill="white" opacity="0.08"/>
      <circle cx="15"  cy="160" r="75"  fill="white" opacity="0.07"/>
      <!-- 波浪條 -->
      <path d="M0,110 Q72,90 145,110 T290,110 L290,183 L0,183 Z" fill="black" opacity="0.12"/>
      <!-- 中央文字 -->
      <text x="145" y="88"  font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="3">客製化設計</text>
      <text x="145" y="109" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.80" letter-spacing="2">CUSTOM PRINT</text>
      <!-- 晶片 -->
      <rect x="18" y="60" width="42" height="32" rx="5" fill="#D4AF37" opacity="0.90"/>
      <line x1="18" y1="70" x2="60" y2="70" stroke="#A8880A" stroke-width="1"/>
      <line x1="18" y1="82" x2="60" y2="82" stroke="#A8880A" stroke-width="1"/>
      <line x1="32" y1="60" x2="32" y2="92" stroke="#A8880A" stroke-width="1"/>
      <line x1="46" y1="60" x2="46" y2="92" stroke="#A8880A" stroke-width="1"/>
      <!-- 底部條 -->
      <rect x="0" y="148" width="290" height="35" fill="black" opacity="0.28"/>
      <text x="145" y="170" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">一卡通 iPASS</text>
      <text x="18" y="143" font-family="monospace" font-size="9" fill="white" opacity="0.70" letter-spacing="2">0000  0000  0000  0000</text>
    </g>
    <rect width="290" height="183" rx="13" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  </g>
</svg>
