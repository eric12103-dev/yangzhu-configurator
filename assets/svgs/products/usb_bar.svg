<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280">
  <defs>
    <filter id="usb-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <!-- 金屬殼漸層 -->
    <linearGradient id="usb-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E8E8E8"/>
      <stop offset="18%"  stop-color="#F5F5F5"/>
      <stop offset="50%"  stop-color="#C0C0C0"/>
      <stop offset="82%"  stop-color="#A8A8A8"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
    <!-- 印刷面漸層 -->
    <linearGradient id="usb-print" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1A237E"/>
      <stop offset="40%"  stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <!-- 接頭金屬 -->
    <linearGradient id="usb-plug" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#B8A040"/>
      <stop offset="50%"  stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#B8A040"/>
    </linearGradient>
    <linearGradient id="usb-plug2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#9090A0"/>
      <stop offset="50%"  stop-color="#E0E0F0"/>
      <stop offset="100%" stop-color="#9090A0"/>
    </linearGradient>
    <!-- 高光 -->
    <linearGradient id="usb-gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.0"/>
    </linearGradient>
    <clipPath id="usb-body-clip">
      <rect x="0" y="0" width="270" height="72" rx="11" ry="11"/>
    </clipPath>
  </defs>

  <!-- 整體置中 -->
  <g transform="translate(35,95)" filter="url(#usb-sh)">

    <!-- USB 主殼（金屬條形） -->
    <rect x="0" y="0" width="270" height="72" rx="11" ry="11" fill="url(#usb-body)"/>

    <!-- 客製化印刷區（正面） -->
    <g clip-path="url(#usb-body-clip)">
      <rect x="12" y="8" width="200" height="56" rx="6" fill="url(#usb-print)"/>
      <!-- 印刷裝飾 -->
      <circle cx="212" cy="20" r="40" fill="white" opacity="0.05"/>
      <circle cx="25"  cy="60" r="30" fill="white" opacity="0.05"/>
      <!-- 印刷文字 -->
      <text x="110" y="30" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="2" opacity="0.90">YOUR BRAND</text>
      <text x="110" y="48" font-family="Arial,sans-serif" font-size="8"  fill="white" text-anchor="middle" opacity="0.70" letter-spacing="1">客製化隨身碟</text>
      <text x="110" y="60" font-family="Arial,sans-serif" font-size="7"  fill="white" text-anchor="middle" opacity="0.55">CUSTOM USB DRIVE</text>
    </g>

    <!-- 殼體高光 -->
    <rect x="0" y="0" width="270" height="32" rx="11" ry="11" fill="url(#usb-gloss)"/>
    <rect x="0" y="0" width="270" height="72" rx="11" ry="11" fill="none" stroke="#AAAAAA" stroke-width="0.8" opacity="0.6"/>

    <!-- Type-A 接頭 -->
    <g transform="translate(256,14)">
      <rect x="0" y="0" width="50" height="44" rx="3" fill="url(#usb-plug2)"/>
      <rect x="4" y="4" width="42" height="36" rx="2" fill="#B0B0C0"/>
      <rect x="4" y="4" width="42" height="36" rx="2" fill="none" stroke="#808090" stroke-width="0.5"/>
    </g>

    <!-- Type-C 孔（另一側小） -->
    <g transform="translate(-14,26)">
      <rect x="0" y="0" width="18" height="20" rx="4" fill="#D0D0D0"/>
      <rect x="2" y="2" width="14" height="16" rx="3" fill="#A0A0A0"/>
    </g>

    <!-- 螺絲孔裝飾 -->
    <circle cx="245" cy="12" r="3" fill="#B0B0B0"/>
    <circle cx="245" cy="60" r="3" fill="#B0B0B0"/>
  </g>

  <!-- 容量標籤 -->
  <g transform="translate(130,210)">
    <rect x="0" y="0" width="160" height="30" rx="15" fill="#1A237E" opacity="0.90"/>
    <text x="80" y="20" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="1">16GB ～ 256GB</text>
  </g>
</svg>
