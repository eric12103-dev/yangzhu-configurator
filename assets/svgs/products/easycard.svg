<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280">
  <defs>
    <filter id="ec-sh1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.20"/>
    </filter>
    <filter id="ec-sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="7"  flood-color="#000" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="ec-g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8B1CF5"/>
      <stop offset="45%"  stop-color="#E5107A"/>
      <stop offset="100%" stop-color="#FF6200"/>
    </linearGradient>
    <linearGradient id="ec-g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00AEEF"/>
      <stop offset="100%" stop-color="#00C85A"/>
    </linearGradient>
    <clipPath id="ec-c1"><rect width="290" height="183" rx="13" ry="13"/></clipPath>
    <clipPath id="ec-c2"><rect width="290" height="183" rx="13" ry="13"/></clipPath>
  </defs>

  <!-- 後卡（背面） -->
  <g transform="translate(125,25) rotate(7)" filter="url(#ec-sh2)">
    <rect width="290" height="183" rx="13" fill="white"/>
    <g clip-path="url(#ec-c2)">
      <rect width="290" height="183" fill="url(#ec-g2)"/>
      <circle cx="260" cy="30"  r="90" fill="white" opacity="0.07"/>
      <circle cx="30"  cy="160" r="75" fill="white" opacity="0.07"/>
      <rect x="18" y="68" width="42" height="32" rx="5" fill="#D4AF37" opacity="0.85"/>
      <line x1="18" y1="78" x2="60" y2="78" stroke="#A8880A" stroke-width="1"/>
      <line x1="18" y1="90" x2="60" y2="90" stroke="#A8880A" stroke-width="1"/>
      <line x1="32" y1="68" x2="32" y2="100" stroke="#A8880A" stroke-width="1"/>
      <line x1="46" y1="68" x2="46" y2="100" stroke="#A8880A" stroke-width="1"/>
      <rect x="0" y="148" width="290" height="35" fill="black" opacity="0.22"/>
      <text x="145" y="170" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">悠遊卡 EasyCard</text>
    </g>
  </g>

  <!-- 前卡（客製設計面） -->
  <g transform="translate(10,18)" filter="url(#ec-sh1)">
    <rect width="290" height="183" rx="13" fill="white"/>
    <g clip-path="url(#ec-c1)">
      <rect width="290" height="183" fill="url(#ec-g1)"/>
      <!-- 裝飾幾何 -->
      <circle cx="250" cy="35"  r="85"  fill="white" opacity="0.08"/>
      <circle cx="20"  cy="155" r="70"  fill="white" opacity="0.07"/>
      <polygon points="145,8 185,70 105,70" fill="white" opacity="0.10"/>
      <!-- 中央文字 -->
      <text x="145" y="92"  font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="3">客製化設計</text>
      <text x="145" y="113" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.80" letter-spacing="2">CUSTOM PRINT</text>
      <!-- 晶片 -->
      <rect x="18" y="60" width="42" height="32" rx="5" fill="#D4AF37" opacity="0.90"/>
      <line x1="18" y1="70" x2="60" y2="70" stroke="#A8880A" stroke-width="1"/>
      <line x1="18" y1="82" x2="60" y2="82" stroke="#A8880A" stroke-width="1"/>
      <line x1="32" y1="60" x2="32" y2="92" stroke="#A8880A" stroke-width="1"/>
      <line x1="46" y1="60" x2="46" y2="92" stroke="#A8880A" stroke-width="1"/>
      <!-- 底部條 -->
      <rect x="0" y="148" width="290" height="35" fill="black" opacity="0.28"/>
      <text x="145" y="170" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">悠遊卡 EasyCard</text>
      <!-- 卡號模擬 -->
      <text x="18" y="143" font-family="monospace" font-size="9" fill="white" opacity="0.70" letter-spacing="2">0000  0000  0000  0000</text>
    </g>
    <rect width="290" height="183" rx="13" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  </g>
</svg>
