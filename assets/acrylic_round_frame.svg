<?xml version="1.0" encoding="utf-8"?>
<!-- 頌禮文創 - 標準正圓形壓克力刀模圖 (含頂部鑰匙圈掛耳扣孔) -->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="100%" height="100%">
  <defs>
    <style>
      .cut-line { fill: none; stroke: #E60012; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .bleed-line { fill: none; stroke: #0075C9; stroke-width: 1; opacity: 0.7; }
      .frame-body { fill: rgba(255,255,255,0.1); stroke: #231815; stroke-width: 2; }
    </style>
  </defs>
  <!-- 壓克力主體外廓刀模線 (直徑 55mm 對應半徑 160px) + 頂部掛耳孔 -->
  <g id="刀模外框">
    <!-- 掛耳外廓 -->
    <path class="frame-body" d="M 170 80 A 30 30 0 0 1 230 80 L 230 100 L 170 100 Z" />
    <!-- 正圓主體 -->
    <circle class="frame-body" cx="200" cy="250" r="160" />
    <!-- 頂部穿孔圓眼 -->
    <circle cx="200" cy="75" r="12" fill="none" stroke="#E60012" stroke-width:="1.5" />
    <!-- 紅色雷切刀模虛線 -->
    <circle class="cut-line" cx="200" cy="250" r="160" />
    <!-- 藍色印刷出血線 -->
    <circle class="bleed-line" cx="200" cy="250" r="154" />
  </g>
</svg>
